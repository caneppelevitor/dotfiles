vault:
    defaultPath: /Users/caneppele/Documents/Notes do Papai/obsidian-git/Knowledge/zettelkasten/1-raw-notes
    rootPath: /Users/caneppele/Documents/Notes do Papai/obsidian-git
logging:
    tasks:
        logFile: tasks-log.md
        autoLog: true
    ideas:
        logFile: ideas-log.md
        autoLog: true
    questions:
        logFile: questions-log.md
        autoLog: true
    insights:
        logFile: insights-log.md
        autoLog: true
    timestampFormat: simple
dailyNotes:
    sections:
        - Daily Log
        - Tasks
        - Ideas
        - Questions
        - Insights
        - Links to Expand
    tags:
        - '#daily'
        - '#inbox'
    titleFormat: YYYY-MM-DD
interface:
    theme:
        border: cyan
        title: white
        content: white
        input: yellow
        highlight: green
    autoScroll: true
    showLineNumbers: true
    eisenhowerTags:
        '#delegate': "180"
        '#do': "131"
        '#eliminate': "145"
        '#schedule': "66"
organization:
    sectionPrefixes:
        '!': Insights
        '-': Ideas
        '?': Questions
        '[]': Tasks
advanced:
    backup:
        enabled: false
        directory: .obsidian-cli-backups
        maxBackups: 5
    performance:
        maxFileSize: 10
        watchFiles: false
